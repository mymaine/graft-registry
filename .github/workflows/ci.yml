name: ci

on:
  pull_request:
    paths:
      - 'helpers/**'
      - 'manifest.json'
      - '.github/workflows/ci.yml'

jobs:
  check-changed-helpers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff, mypy, pytest, and graft v0.2.0
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest
          pip install 'git+https://github.com/mymaine/graft.git@v0.2.0'

      - name: Compute changed helper services
        id: changed
        run: |
          git fetch origin main --depth=1
          changed=$(git diff --name-only origin/main...HEAD \
            | grep '^helpers/' \
            | cut -d/ -f1-2 \
            | sort -u)
          if [ -z "$changed" ]; then
            echo "No helper directories changed; nothing to check."
            echo "services=" >> "$GITHUB_OUTPUT"
          else
            echo "Changed helper directories:"
            echo "$changed"
            # Emit as space-separated for easy bash iteration
            joined=$(echo "$changed" | tr '\n' ' ')
            echo "services=$joined" >> "$GITHUB_OUTPUT"
          fi

      - name: Run checks per changed helper
        if: steps.changed.outputs.services != ''
        run: |
          set -e
          services="${{ steps.changed.outputs.services }}"
          for dir in $services; do
            svc=$(basename "$dir")
            file="$dir/$svc.py"
            echo ""
            echo "::group::Checking $svc ($dir)"

            if [ ! -f "$file" ]; then
              echo "ERROR: expected helper file $file not found"
              exit 1
            fi

            echo "--- 1/5 ruff check ---"
            ruff check "$dir/"

            echo "--- 2/5 mypy --strict ---"
            mypy --strict "$file"

            echo "--- 3/5 graft validator ---"
            python -c "
          import sys
          from graft.validator import check
          src = open(sys.argv[1]).read()
          fail = check(src, sys.argv[2])
          if fail:
              print(fail)
              sys.exit(1)
          " "$file" "$svc"

            echo "--- 4/5 manifest.json schema ---"
            python -c "
          import json, sys
          svc = sys.argv[1]
          data = json.load(open('manifest.json'))
          services = data.get('services', {})
          if svc not in services:
              print(f'ERROR: service {svc!r} missing from manifest.json services')
              sys.exit(1)
          if not svc.isidentifier():
              print(f'ERROR: service name {svc!r} is not a valid Python identifier')
              sys.exit(1)
          entry = services[svc]
          for field in ('description', 'version', 'path'):
              if field not in entry or not entry[field]:
                  print(f'ERROR: service {svc!r} manifest entry missing required field {field!r}')
                  sys.exit(1)
          path = entry['path']
          if path.startswith('/'):
              print(f'ERROR: manifest path for {svc!r} must not start with /: {path!r}')
              sys.exit(1)
          if '..' in path.split('/'):
              print(f'ERROR: manifest path for {svc!r} must not contain .. segment: {path!r}')
              sys.exit(1)
          print(f'manifest entry for {svc!r}: ok')
          " "$svc"

            echo "--- 5/5 pytest (conditional) ---"
            if [ -d "$dir/tests" ]; then
              pytest "$dir/tests"
            else
              echo "no $dir/tests directory; skipping pytest"
            fi

            echo "::endgroup::"
          done
